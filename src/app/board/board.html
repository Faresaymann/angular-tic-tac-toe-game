<div class="game-shell">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <header class="hero">
    <h1 class="title">Tic Tac Toe</h1>
    <p class="subtitle">
      Two players. One winner. Endless rematches.
    </p>

    <div class="header-actions">
      <button class="reset-btn" (click)="newGame()">Start New Game</button>

      <button
        class="sound-btn"
        [class.muted]="isMuted"
        (click)="toggleSound()"
        [attr.aria-label]="isMuted ? 'Unmute sound' : 'Mute sound'">
        <span class="sound-icon" aria-hidden="true">
          <span class="wave wave-1"></span>
          <span class="wave wave-2"></span>
          <span class="wave wave-3"></span>
        </span>

        <span class="sound-label">{{ isMuted ? 'Muted' : 'Sound On' }}</span>
      </button>
    </div>
  </header>

  <div class="mode-toggle">
    <button (click)="setMode('single')" [class.active]="mode === 'single'">
      Play vs AI
    </button>

    <button (click)="setMode('two')" [class.active]="mode === 'two'">
      Play Local
    </button>

    <button (click)="setMode('online')" [class.active]="mode === 'online'">
      Online Room
    </button>

    <div class="slider" [class.right]="mode === 'two'" [class.extra-right]="mode === 'online'"></div>
  </div>

  <section class="online-panel" *ngIf="mode === 'online'">
    <div class="online-row">
      <input
        class="room-input"
        type="text"
        [(ngModel)]="roomInput"
        placeholder="Room code"
        maxlength="12"
      />

      <button class="room-btn secondary" (click)="joinOnlineRoom()">Join Room</button>
      <button class="room-btn primary" (click)="createOnlineRoom()">Create Room</button>
    </div>

    <div class="online-meta" *ngIf="roomCode">
      <span>Room: <strong>{{ roomCode }}</strong></span>
      <button class="room-btn secondary" (click)="copyRoomLink()">Copy Link</button>
    </div>

    <p class="room-error" *ngIf="onlineError">{{ onlineError }}</p>
  </section>

  <section class="status-wrap">
    <p
      class="status current-player"
      [class.ai-think]="statusState === 'thinking' || statusState === 'waiting'"
      [class.human-turn]="statusState === 'human'"
      *ngIf="!winner && !draw">
      {{ currentPlayerText }}
    </p>

    <p class="status winner-text" *ngIf="winner">
      {{ winnerText }}
    </p>

    <p class="status draw-text" *ngIf="draw">
      {{ drawText }}
    </p>
  </section>

  <main class="board" [class.board-win]="winner" [class.board-draw]="draw">
    <app-square
      *ngFor="let val of squares; let i = index"
      [value]="val"
      [isWinning]="winningLine?.includes(i) ?? false"
      (clicked)="makeMove(i)">
    </app-square>
  </main>

  <div class="play-again-modal" *ngIf="showPlayAgain">
    <div class="play-again-panel">
      <p>Wanna play again?</p>
      <button class="new-game-btn" (click)="newGame()">Play Again</button>
    </div>
  </div>

  <div class="celebration" *ngIf="celebrationActive" aria-hidden="true">
    <span
      class="spark"
      *ngFor="let s of sparks"
      [style.--x.px]="s.x"
      [style.--y.px]="s.y"
      [style.--delay]="s.delay + 's'"
      [style.--size.px]="s.size"
      [style.--color]="s.color">
    </span>
  </div>
</div>
